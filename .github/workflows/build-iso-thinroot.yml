name: Build SecureGate thinRoot ISO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-24.04 # Loglarında kullandığın ve stabil çalışan güncel LTS

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # Extraheader çakışmasını engellemek ve ilerde sorun yaşamamak için kritik ayar:
        persist-credentials: false 

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y git build-essential dc rsync file wget cpio unzip bc bzr

    - name: Clone thinRoot
      run: |
        # Extraheader çatışmasını kestiğimiz için temiz bir klonlama yapar
        git clone https://github.com/jens-maus/thinRoot.git
        cd thinRoot

    - name: Compile ISO
      run: |
        cd thinRoot
        make thinroot_defconfig
        make

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: securegate-thinroot-iso
        path: thinRoot/output/images/thinroot.iso
