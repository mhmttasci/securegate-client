name: Build Pure thinRoot ISO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y git build-essential dc rsync file wget cpio unzip bc bzr

    - name: Clone thinRoot
      run: |
        git clone https://github.com/jens-maus/thinRoot.git

    - name: Compile ISO
      run: |
        # 1. thinRoot klasörünün içine girip varsayılan konfigürasyonu yüklüyoruz
        cd thinRoot
        make defconfig
        
        # 2. Derleme işlemini root haklarıyla aynı klasörde başlatıyoruz
        sudo make
