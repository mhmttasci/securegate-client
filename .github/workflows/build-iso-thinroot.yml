name: Build Pure thinRoot ISO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-24.04 # En güncel ve stabil LTS

    # Bütün komutların doğrudan thinRoot içinde çalışması için dizin kilitliyoruz
    defaults:
      run:
        working-directory: ./thinRoot

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false # Gizli header çatışmalarını ve yetki hatalarını önler

    - name: Install Build Dependencies
      working-directory: ./ # Bağımlılıklar ana dizinde kurulmalı
      run: |
        sudo apt update
        sudo apt install -y git build-essential dc rsync file wget cpio unzip bc bzr

    - name: Clone thinRoot
      working-directory: ./ # Klonlama işlemi ana dizinde yapılmalı
      run: |
        git clone https://github.com/jens-maus/thinRoot.git

    - name: Compile ISO
      run: |
        # Doğru dizinde kilitli olduğumuz için defconfig tıkır tıkır çalışacak
        make thinroot_defconfig
        
        # Derleme işlemi (Root haklarıyla)
        sudo make

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pure-thinroot-iso
        path: thinRoot/output/images/thinroot.iso
