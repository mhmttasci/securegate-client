name: Build SecureGate thinRoot ISO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-24.04 # 2026 şartlarında güncel ve stabil LTS

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y git build-essential dc rsync file wget cpio unzip bc bzr

    - name: Clone thinRoot
      run: |
        git clone https://github.com/jens-maus/thinRoot.git
        cd thinRoot

    - name: Inject Custom Config & Scripts
      run: |
        # Buraya senin az önce yazdığımız securegate_client.sh dosyasını 
        # thinRoot'un içine gömen 'cp' komutlarını yazacağız.
        echo "Injecting custom securegate scripts..."

    - name: Compile ISO
      run: |
        cd thinRoot
        make thinroot_defconfig
        make

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: securegate-thinroot-iso
        path: thinRoot/output/images/thinroot.iso
