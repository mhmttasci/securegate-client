name: Build Pure thinRoot ISO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y git build-essential dc rsync file wget cpio unzip bc bzr

    - name: Clone thinRoot
      run: |
        git clone https://github.com/jens-maus/thinRoot.git

    - name: Compile ISO
      run: |
        # Klasör nerede olursa olsun 'make' komutunu thinRoot içinde çalışmaya zorluyoruz
        make --directory=thinRoot thinroot_defconfig
        
        # Derleme işlemini de aynı klasörde root haklarıyla tetikliyoruz
        sudo make --directory=thinRoot

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pure-thinroot-iso
        path: thinRoot/output/images/thinroot.iso
