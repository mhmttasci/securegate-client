name: Build Pure thinRoot ISO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y git build-essential dc rsync file wget cpio unzip bc bzr

    - name: Clone thinRoot
      run: |
        git clone https://github.com/jens-maus/thinRoot
        
    - name: Compile thinRoot Release
      run: |
        cd thinRoot
        # Senin paylaştığın o sihirli komut:
        # Loop device ve dosya sistemi işlemleri için sudo ile tetikliyoruz
        sudo make PRODUCT=generic-x86_64 release

    - name: Upload Image Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pure-thinroot-image
        # Proje çıktıyı release klasörüne attığı için oradaki dosyayı topluyoruz
        path: thinRoot/release/*.img
