name: SecureGate ISO Builder (Debian Live)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - '.github/workflows/build.yml'
      - 'build-iso.sh'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: ISO oluştur (Debian container)
        run: |
          mkdir -p /tmp/output
          docker run --rm --privileged \
            -v $(pwd)/build-iso.sh:/build-iso.sh \
            -v $(pwd)/index.html:/work/index.html \
            -v /tmp/output:/output \
            debian:bookworm bash /build-iso.sh

      - name: ISO artifact hazırla
        run: |
          mkdir -p output
          DATE=$(date +%Y%m%d)
          cp /tmp/output/securegate-debian.iso output/securegate-debian-$DATE.iso
          sha256sum output/securegate-debian-$DATE.iso > output/SHA256SUMS.txt
          ls -lh output/

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: securegate-debian-${{ github.run_number }}
          path: output/
          retention-days: 30
