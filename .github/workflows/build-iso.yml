name: build-iso

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

```
steps:
  - uses: actions/checkout@v4

  - run: sudo apt-get update

  - run: sudo apt-get install -y live-build debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools dosfstools

  - run: |
      mkdir build
      cd build
      lb config --mode debian --distribution bookworm --architectures amd64 --binary-images iso-hybrid

  - run: |
      mkdir -p build/config/package-lists
      echo "linux-image-amd64" > build/config/package-lists/custom.list.chroot
      echo "live-boot" >> build/config/package-lists/custom.list.chroot

  - run: |
      cd build
      sudo lb build

  - run: |
      mkdir output
      find build -name "*.iso" -exec cp {} output/securegate.iso \;

  - uses: actions/upload-artifact@v4
    with:
      name: iso
      path: output/
```
