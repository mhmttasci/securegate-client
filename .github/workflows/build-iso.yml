name: SecureGate ISO Builder (Debian Live)1

on:
workflow_dispatch:
push:
branches: [ main ]
paths:
- 'index.html'
- '.github/workflows/build.yml'

jobs:
build:
runs-on: ubuntu-22.04
timeout-minutes: 90

```
steps:
  - name: Repoyu indir
    uses: actions/checkout@v4

  - name: Araçları kur ve Debian keyring güncelle
    run: |
      sudo apt-get update -qq
      sudo apt-get install -y \
        live-build xorriso grub-efi-amd64-bin grub-pc-bin \
        mtools dosfstools squashfs-tools wget debootstrap gnupg

      wget -q https://ftp-master.debian.org/keys/archive-key-12.asc -O /tmp/debian-key.asc
      sudo gpg --dearmor -o /usr/share/keyrings/debian-archive-keyring.gpg /tmp/debian-key.asc

  - name: live-build yapılandır
    run: |
      mkdir -p lb-config
      cd lb-config
      lb config \
        --distribution bookworm \
        --architectures amd64 \
        --binary-images iso-hybrid \
        --bootloader grub-efi \
        --debian-installer none \
        --memtest none \
        --win32-loader false \
        --iso-volume "SECUREGATE" \
        --apt-recommends false \
        --archive-areas "main contrib non-free non-free-firmware" \
        --mirror-bootstrap "http://deb.debian.org/debian/" \
        --mirror-chroot "http://deb.debian.org/debian/" \
        --mirror-binary "http://deb.debian.org/debian/" \
        --keyring-packages "debian-archive-keyring"

  - name: Paket listesi (FIXED)
    run: |
      mkdir -p lb-config/config/package-lists
      cat > lb-config/config/package-lists/kiosk.list.chroot << 'EOF'
      linux-image-amd64
      live-boot
      systemd-sysv
      chromium
      xorg
      xserver-xorg
      xserver-xorg-video-fbdev
      xserver-xorg-video-vesa
      xserver-xorg-input-evdev
      openbox
      fonts-dejavu
      dbus
      dbus-x11
      x11-xserver-utils
      xinit
      procps
      EOF

  - name: Kiosk dosyaları oluştur
    run: |
      mkdir -p lb-config/config/includes.chroot/etc/systemd/system/getty@tty1.service.d
      mkdir -p lb-config/config/includes.chroot/usr/local/bin
      mkdir -p lb-config/config/includes.chroot/app
      mkdir -p lb-config/config/includes.chroot/root

      cp index.html lb-config/config/includes.chroot/app/index.html

      cat > lb-config/config/includes.chroot/etc/systemd/system/getty@tty1.service.d/autologin.conf << 'EOF'
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM
      EOF

      cat > lb-config/config/includes.chroot/root/.bash_profile << 'EOF'
      if [ "$(tty)" = "/dev/tty1" ]; then
        exec /usr/local/bin/start-kiosk >> /tmp/kiosk.log 2>&1
      fi
      EOF

      cat > lb-config/config/includes.chroot/usr/local/bin/start-kiosk << 'EOF'
      #!/bin/bash
      export HOME=/root DISPLAY=:0

      pgrep -x dbus-daemon >/dev/null || dbus-daemon --system --fork
      sleep 1

      Xorg :0 vt1 -nocursor -nolisten tcp &
      sleep 3

      DISPLAY=:0 openbox &
      sleep 2

      DISPLAY=:0 xset s off || true
      DISPLAY=:0 xset -dpms || true

      DISPLAY=:0 chromium \
        --kiosk --no-sandbox --disable-infobars \
        --disable-session-crashed-bubble --no-first-run \
        --disable-translate --disable-gpu \
        --user-data-dir=/tmp/chrome \
        file:///app/index.html

      while true; do sleep 60; done
      EOF

      chmod +x lb-config/config/includes.chroot/usr/local/bin/start-kiosk

  - name: ISO oluştur
    run: |
      cd lb-config
      sudo lb build 2>&1 | tee /tmp/lb-build.log
      ls -lah

  - name: ISO çıktısını hazırla
    run: |
      mkdir -p output
      ISO=$(find lb-config/ -maxdepth 1 -name "*.iso" 2>/dev/null | head -1)

      if [ -z "$ISO" ]; then
        echo "=== ISO bulunamadı — son log ==="
        tail -100 /tmp/lb-build.log
        exit 1
      fi

      DATE=$(date +%Y%m%d)
      cp "$ISO" "output/securegate-debian-$DATE.iso"

      sha256sum "output/securegate-debian-$DATE.iso" > output/SHA256SUMS.txt
      ls -lh output/

  - name: ISO artifact
    uses: actions/upload-artifact@v4
    with:
      name: securegate-debian-${{ github.run_number }}
      path: output/
      retention-days: 30

  - name: Build logu yükle (hata olursa)
    if: failure()
    uses: actions/upload-artifact@v4
    with:
      name: build-log-${{ github.run_number }}
      path: /tmp/lb-build.log
      retention-days: 7
```
