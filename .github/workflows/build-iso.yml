name: SecureGate ISO Builder (Debian Live)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: ISO oluştur (Debian container içinde)
        run: |
          # index.html'yi container'a taşı
          cp index.html /tmp/index.html

          docker run --rm --privileged \
            -v /tmp/index.html:/work/index.html \
            -v /tmp/output:/output \
            debian:bookworm bash -e << 'DOCKERSCRIPT'

          apt-get update -qq
          apt-get install -y \
            live-build xorriso grub-efi-amd64-bin grub-pc-bin \
            mtools dosfstools squashfs-tools wget debootstrap \
            debian-archive-keyring 2>&1 | tail -5

          mkdir -p /lb && cd /lb

          lb config \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --bootloader grub-efi \
            --debian-installer none \
            --memtest none \
            --win32-loader false \
            --iso-volume "SECUREGATE" \
            --apt-recommends false \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            --mirror-binary "http://deb.debian.org/debian/"

          # Paket listesi
          mkdir -p config/package-lists
          cat > config/package-lists/kiosk.list.chroot << 'EOF'
          chromium
          xorg
          xserver-xorg
          xserver-xorg-video-fbdev
          xserver-xorg-video-vesa
          xserver-xorg-input-evdev
          openbox
          fonts-dejavu
          dbus
          dbus-x11
          x11-xserver-utils
          xinit
          procps
          EOF

          # Kiosk dosyaları
          mkdir -p config/includes.chroot/etc/systemd/system/getty@tty1.service.d
          mkdir -p config/includes.chroot/usr/local/bin
          mkdir -p config/includes.chroot/app
          mkdir -p config/includes.chroot/root

          cp /work/index.html config/includes.chroot/app/index.html

          cat > config/includes.chroot/etc/systemd/system/getty@tty1.service.d/autologin.conf << 'EOF'
          [Service]
          ExecStart=
          ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM
          EOF

          cat > config/includes.chroot/root/.bash_profile << 'EOF'
          if [ "$(tty)" = "/dev/tty1" ]; then
            exec /usr/local/bin/start-kiosk >> /tmp/kiosk.log 2>&1
          fi
          EOF

          cat > config/includes.chroot/usr/local/bin/start-kiosk << 'EOF'
          #!/bin/bash
          export HOME=/root DISPLAY=:0
          LOG=/tmp/kiosk.log
          ts() { date '+%H:%M:%S'; }
          echo "" >> $LOG
          echo "=== $(ts) SecureGate Kiosk ===" >> $LOG

          pgrep -x dbus-daemon >/dev/null || dbus-daemon --system --fork >> $LOG 2>&1 || true
          sleep 1

          mkdir -p /etc/X11
          cat > /etc/X11/xorg.conf << 'XCONF'
          Section "ServerFlags"
            Option "DontZap" "true"
            Option "DontVTSwitch" "true"
          EndSection
          Section "Device"
            Identifier "Card0"
            Driver "fbdev"
          EndSection
          Section "Screen"
            Identifier "Screen0"
            Device "Card0"
            DefaultDepth 24
          EndSection
          XCONF

          Xorg :0 vt1 -nocursor -nolisten tcp -config /etc/X11/xorg.conf >> /tmp/xorg.log 2>&1 &
          for i in $(seq 1 20); do
            DISPLAY=:0 xdpyinfo >/dev/null 2>&1 && break
            sleep 1
          done

          mkdir -p /root/.config/openbox
          cat > /root/.config/openbox/rc.xml << 'OBXML'
          <?xml version="1.0" encoding="UTF-8"?>
          <openbox_config>
            <keyboard>
              <keybind key="A-F4"><action name="Nothing"/></keybind>
              <keybind key="A-Tab"><action name="Nothing"/></keybind>
              <keybind key="C-A-t"><action name="Nothing"/></keybind>
            </keyboard>
            <mouse><context name="Root"/></mouse>
            <applications>
              <application class="*">
                <decor>no</decor>
                <maximized>yes</maximized>
              </application>
            </applications>
          </openbox_config>
          OBXML

          DISPLAY=:0 openbox --config-file /root/.config/openbox/rc.xml &
          sleep 2
          DISPLAY=:0 xset s off 2>/dev/null || true
          DISPLAY=:0 xset -dpms 2>/dev/null || true

          mkdir -p /tmp/cr-data
          DISPLAY=:0 chromium \
            --kiosk --no-sandbox --disable-infobars \
            --disable-session-crashed-bubble --no-first-run \
            --disable-translate --disable-features=TranslateUI \
            --disable-pinch --disable-gpu --in-process-gpu \
            --user-data-dir=/tmp/cr-data --start-fullscreen \
            "file:///app/index.html" >> $LOG 2>&1

          sleep 3; exec "$0"
          EOF
          chmod 755 config/includes.chroot/usr/local/bin/start-kiosk

          # Build
          lb build 2>&1

          # ISO çıktısı
          mkdir -p /output
          ISO=$(find /lb -maxdepth 1 -name "*.iso" | head -1)
          if [ -z "$ISO" ]; then
            echo "HATA: ISO bulunamadı"
            ls -la /lb/
            exit 1
          fi
          cp "$ISO" /output/securegate-debian.iso
          echo "ISO hazır: $(du -sh /output/securegate-debian.iso)"
          DOCKERSCRIPT

      - name: ISO çıktısını hazırla
        run: |
          mkdir -p output
          ls -lh /tmp/output/
          DATE=$(date +%Y%m%d)
          cp /tmp/output/securegate-debian.iso output/securegate-debian-$DATE.iso
          sha256sum output/securegate-debian-$DATE.iso > output/SHA256SUMS.txt
          cat output/SHA256SUMS.txt

      - name: ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: securegate-debian-${{ github.run_number }}
          path: output/
          retention-days: 30
